---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Keeposz/nas-pi-cluster.git
    path: deployments/observability/grafana
    targetRevision: HEAD
    helm:
      releaseName: grafana
      valuesObject:
        grafana:
          adminUser: admin
          adminPassword: ""
          existingSecret: grafana-admin
          persistence:
            enabled: true
            size: 2Gi
            storageClassName: local-path
          resources:
            requests:
              memory: "192Mi"
              cpu: "50m"
            limits:
              memory: "384Mi"
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              searchNamespace: observability
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: "default"
                  orgId: 1
                  folder: ""
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default
          dashboards:
            default:
              k3s-cluster-monitoring:
                gnetId: 15282
                revision: 1
                datasource: Prometheus
              node-exporter-full:
                gnetId: 1860
                revision: 37
                datasource: Prometheus
          datasources:
            datasources.yaml:
              apiVersion: 1
              datasources:
                - name: Prometheus
                  type: prometheus
                  url: http://prometheus-server.observability.svc.cluster.local
                  access: proxy
                  isDefault: true
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - grafana.home.keeposz.dev
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.home.keeposz.dev
  destination:
    server: "https://kubernetes.default.svc"
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true