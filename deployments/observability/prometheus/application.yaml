---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Keeposz/nas-pi-cluster.git
    path: deployments/observability/prometheus
    targetRevision: HEAD
    helm:
      releaseName: prometheus
      valuesObject:
        prometheus:
          alertmanager:
            enabled: false
          prometheus-pushgateway:
            enabled: false
          prometheus-node-exporter:
            enabled: true
            resources:
              requests:
                memory: "32Mi"
                cpu: "25m"
              limits:
                memory: "64Mi"
          kube-state-metrics:
            resources:
              requests:
                memory: "64Mi"
                cpu: "25m"
              limits:
                memory: "128Mi"
          server:
            retention: "3d"          # 7d → 3d; minder data in head/WAL
            persistentVolume:
              enabled: true
              size: 10Gi
              storageClass: local-path
            extraArgs:
              storage.tsdb.retention.size: "2GB"   # hard cap on disk usage
            global:
              scrape_interval: 60s   # 15s → 60s; 4× minder data points
              evaluation_interval: 60s
            resources:
              requests:
                memory: "256Mi"
                cpu: "50m"
              limits:
                memory: "512Mi"      # 1Gi → 512Mi; forces aggressive offload
            ingress:
              enabled: true
              ingressClassName: traefik
              annotations:
                cert-manager.io/cluster-issuer: letsencrypt-prod
              hosts:
                - prometheus.home.keeposz.dev
              tls:
                - secretName: prometheus-tls
                  hosts:
                    - prometheus.home.keeposz.dev
  destination:
    server: "https://kubernetes.default.svc"
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
