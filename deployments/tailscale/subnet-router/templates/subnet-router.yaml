---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-subnet-router
  namespace: tailscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailscale-subnet-router
  template:
    metadata:
      labels:
        app: tailscale-subnet-router
    spec:
      serviceAccountName: tailscale-sa
      containers:
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:latest
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: auth-key
            - name: TS_ROUTES
              value: "10.42.0.0/16,10.43.0.0/16"
            - name: TS_KUBE_SECRET
              value: "tailscale-state"
            - name: TS_USERSPACE
              value: "false"
            - name: TS_HOSTNAME
              value: "nas-pi-cluster"
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          # netcheck does a real connectivity test (DERP relays, UDP, etc.) —
          # catches the wireguard handshake-loop state that "tailscale status"
          # misses (daemon stays alive but tunnel is dead). Runs every 2 min,
          # 3 consecutive failures triggers restart (~6 min recovery time).
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - tailscale netcheck 2>&1 | grep -q "DERP latency"
            initialDelaySeconds: 90
            periodSeconds: 120
            timeoutSeconds: 30
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - tailscale
                - status
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24    # up to 2 min for first connection
