---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recepten
  namespace: recepten
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: recepten
  template:
    metadata:
      labels:
        app: recepten
    spec:
      containers:
        - name: recepten
          image: ghcr.io/keeposz/recepten:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: TZ
              value: "Europe/Brussels"
            - name: DATABASE_PATH
              value: "/data/recepten.db"
            - name: UPLOAD_DIR
              value: "/data/uploads"
          resources:
            requests:
              memory: "96Mi"
              cpu: "50m"
            limits:
              memory: "384Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: recepten-data
