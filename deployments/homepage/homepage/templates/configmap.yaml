---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-content
  namespace: homepage
data:
  settings.yaml: |
    title: Homelab
    favicon: https://cdn.simpleicons.org/raspberrypi/c51a4a
    theme: dark
    color: slate
    headerStyle: clean
    hideVersion: true
    layout:
      Apps:
        style: row
        columns: 2
      Infra:
        style: row
        columns: 2
      Observability:
        style: row
        columns: 2

  services.yaml: |
    - Apps:
        - Plex:
            href: https://plex.home.keeposz.dev
            description: Media server
            icon: plex.svg
            siteMonitor: https://plex.home.keeposz.dev
        - Recepten:
            href: https://recepten.home.keeposz.dev
            description: Recept app
            icon: mdi-silverware-fork-knife
            siteMonitor: https://recepten.home.keeposz.dev

    - Infra:
        - ArgoCD:
            href: https://argocd.home.keeposz.dev
            description: GitOps deployments
            icon: argo-cd.svg
            siteMonitor: https://argocd.home.keeposz.dev
        - Renovate:
            href: https://renovate.home.keeposz.dev
            description: Dependency updates
            icon: renovate.svg
            siteMonitor: https://renovate.home.keeposz.dev

    - Observability:
        - Grafana:
            href: https://grafana.home.keeposz.dev
            description: Dashboards
            icon: grafana.svg
            siteMonitor: https://grafana.home.keeposz.dev
        - Prometheus:
            href: https://prometheus.home.keeposz.dev
            description: Metrics
            icon: prometheus.svg
            siteMonitor: https://prometheus.home.keeposz.dev

  widgets.yaml: |
    - resources:
        backend: kubernetes
        expanded: true
        cpu: true
        memory: true
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "Cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: duckduckgo
        target: _blank
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: short
          hourCycle: h23

  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - abbr: GH
              href: https://github.com/Keeposz

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""
