---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-content
  namespace: homepage
data:
  settings.yaml: |
    title: Homelab
    favicon: https://cdn.simpleicons.org/raspberrypi/c51a4a
    theme: dark
    color: slate
    headerStyle: clean
    hideVersion: true
    layout:
      Services:
        style: row
        columns: 2
        header: false

  services.yaml: |
    - Services:
        - Plex:
            href: https://plex.home.keeposz.dev
            description: Media server
            icon: plex.svg
            siteMonitor: https://plex.home.keeposz.dev
            widget:
              type: plex
              url: http://plex.plex.svc.cluster.local:32400
              key: {{`{{HOMEPAGE_VAR_PLEX_TOKEN}}`}}
        - Seerr:
            href: https://seerr.home.keeposz.dev
            description: Request films & series
            icon: jellyseerr.svg
            siteMonitor: https://seerr.home.keeposz.dev
            widget:
              type: jellyseerr
              url: http://seerr-seerr-chart.media.svc.cluster.local
              key: {{`{{HOMEPAGE_VAR_SEERR_KEY}}`}}
        - Radarr:
            href: https://radarr.home.keeposz.dev
            description: Movie manager
            icon: radarr.svg
            siteMonitor: https://radarr.home.keeposz.dev
            widget:
              type: radarr
              url: http://radarr.media.svc.cluster.local:7878
              key: {{`{{HOMEPAGE_VAR_RADARR_KEY}}`}}
        - Sonarr:
            href: https://sonarr.home.keeposz.dev
            description: TV series manager
            icon: sonarr.svg
            siteMonitor: https://sonarr.home.keeposz.dev
            widget:
              type: sonarr
              url: http://sonarr.media.svc.cluster.local:8989
              key: {{`{{HOMEPAGE_VAR_SONARR_KEY}}`}}
        - Bazarr:
            href: https://bazarr.home.keeposz.dev
            description: Subtitle manager
            icon: bazarr.svg
            siteMonitor: https://bazarr.home.keeposz.dev
            widget:
              type: bazarr
              url: http://bazarr.media.svc.cluster.local:6767
              key: {{`{{HOMEPAGE_VAR_BAZARR_KEY}}`}}
        - Prowlarr:
            href: https://prowlarr.home.keeposz.dev
            description: Indexer manager
            icon: prowlarr.svg
            siteMonitor: https://prowlarr.home.keeposz.dev
            widget:
              type: prowlarr
              url: http://prowlarr.media.svc.cluster.local:9696
              key: {{`{{HOMEPAGE_VAR_PROWLARR_KEY}}`}}
        - qBittorrent:
            href: https://qbittorrent.home.keeposz.dev
            description: Torrent client (via NordVPN)
            icon: qbittorrent.svg
            siteMonitor: https://qbittorrent.home.keeposz.dev
            widget:
              type: qbittorrent
              url: http://qbittorrent.media.svc.cluster.local:8080
              username: {{`{{HOMEPAGE_VAR_QBIT_USER}}`}}
              password: {{`{{HOMEPAGE_VAR_QBIT_PASS}}`}}
        - Recepten:
            href: https://recepten.home.keeposz.dev
            description: Recept app
            icon: mdi-silverware-fork-knife
            siteMonitor: https://recepten.home.keeposz.dev
        - ArgoCD:
            href: https://argocd.home.keeposz.dev
            description: GitOps deployments
            icon: argo-cd.svg
            siteMonitor: https://argocd.home.keeposz.dev
        - Renovate:
            href: https://renovate.home.keeposz.dev
            description: Dependency updates
            icon: renovate.svg
            siteMonitor: https://renovate.home.keeposz.dev
        - Grafana:
            href: https://grafana.home.keeposz.dev
            description: Dashboards
            icon: grafana.svg
            siteMonitor: https://grafana.home.keeposz.dev
            widget:
              type: grafana
              url: https://grafana.home.keeposz.dev
              username: {{`{{HOMEPAGE_VAR_GRAFANA_USER}}`}}
              password: {{`{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}`}}
        - Prometheus:
            href: https://prometheus.home.keeposz.dev
            description: Metrics
            icon: prometheus.svg
            siteMonitor: https://prometheus.home.keeposz.dev
            widget:
              type: prometheus
              url: https://prometheus.home.keeposz.dev

  widgets.yaml: |
    - resources:
        backend: kubernetes
        expanded: true
        cpu: true
        memory: true
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "Cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - openmeteo:
        label: Gent
        latitude: 51.054
        longitude: 3.717
        timezone: Europe/Brussels
        units: metric
        cache: 5
    - glances:
        url: http://glances.glances:61208
        version: 4
        cpu: true
        mem: true
        cputemp: true
        uptime: true
        disk: /
        diskio: true
        network: eth0
        expanded: true
    - search:
        provider: duckduckgo
        target: _blank
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: short
          hourCycle: h23

  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - abbr: GH
              href: https://github.com/Keeposz

  kubernetes.yaml: |
    mode: cluster
