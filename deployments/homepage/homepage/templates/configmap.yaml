---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-content
  namespace: homepage
data:
  settings.yaml: |
    title: Homelab
    favicon: https://cdn.simpleicons.org/raspberrypi/c51a4a
    theme: dark
    color: slate
    headerStyle: clean
    hideVersion: true
    layout:
      Apps:
        style: row
        columns: 2
      Infra:
        style: row
        columns: 2
      Observability:
        style: row
        columns: 2

  services.yaml: |
    - Apps:
        - Plex:
            href: https://plex.home.keeposz.dev
            description: Media server
            icon: plex.svg
            siteMonitor: https://plex.home.keeposz.dev
            widget:
              type: plex
              url: https://plex.home.keeposz.dev
              key: {{`{{HOMEPAGE_VAR_PLEX_TOKEN}}`}}
        - Recepten:
            href: https://recepten.home.keeposz.dev
            description: Recept app
            icon: mdi-silverware-fork-knife
            siteMonitor: https://recepten.home.keeposz.dev

    - Infra:
        - ArgoCD:
            href: https://argocd.home.keeposz.dev
            description: GitOps deployments
            icon: argo-cd.svg
            siteMonitor: https://argocd.home.keeposz.dev
            widget:
              type: argocd
              url: https://argocd.home.keeposz.dev
              username: {{`{{HOMEPAGE_VAR_ARGOCD_USER}}`}}
              password: {{`{{HOMEPAGE_VAR_ARGOCD_PASSWORD}}`}}
        - Renovate:
            href: https://renovate.home.keeposz.dev
            description: Dependency updates
            icon: renovate.svg
            siteMonitor: https://renovate.home.keeposz.dev

    - Observability:
        - Grafana:
            href: https://grafana.home.keeposz.dev
            description: Dashboards
            icon: grafana.svg
            siteMonitor: https://grafana.home.keeposz.dev
            widget:
              type: grafana
              url: https://grafana.home.keeposz.dev
              username: {{`{{HOMEPAGE_VAR_GRAFANA_USER}}`}}
              password: {{`{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}`}}
        - Prometheus:
            href: https://prometheus.home.keeposz.dev
            description: Metrics
            icon: prometheus.svg
            siteMonitor: https://prometheus.home.keeposz.dev
            widget:
              type: prometheus
              url: https://prometheus.home.keeposz.dev

  widgets.yaml: |
    - resources:
        backend: kubernetes
        expanded: true
        cpu: true
        memory: true
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "Cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - openmeteo:
        label: Gent
        latitude: 51.054
        longitude: 3.717
        timezone: Europe/Brussels
        units: metric
        cache: 5
    - glances:
        url: http://glances.glances:61208
        version: 4
        cpu: true
        mem: true
        cputemp: true
        uptime: true
        disk: /
        diskio: true
        network: eth0
        expanded: true
    - search:
        provider: duckduckgo
        target: _blank
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: short
          hourCycle: h23

  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - abbr: GH
              href: https://github.com/Keeposz

  kubernetes.yaml: |
    mode: cluster
