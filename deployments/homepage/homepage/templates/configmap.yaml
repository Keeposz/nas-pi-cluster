---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-content
  namespace: homepage
data:
  config.yml: |
    title: "Homelab"
    subtitle: "Keeposz"
    documentTitle: "Homelab"
    icon: "fas fa-home"
    header: true
    footer: '<p>nas-pi-cluster · K3s op Raspberry Pi</p>'
    columns: "auto"
    connectivityCheck: true
    defaults:
      layout: columns
      colorTheme: dark
    theme: default
    colors:
      dark:
        highlight-primary: "#7aa2f7"
        highlight-secondary: "#1a1f2e"
        highlight-hover: "#283042"
        background: "#0a0d14"
        card-background: "#171a21"
        text: "#e6e8eb"
        text-header: "#ffffff"
        text-title: "#e6e8eb"
        text-subtitle: "#8a93a6"
        card-shadow: rgba(0, 0, 0, 0.3)
        link: "#7aa2f7"
        link-hover: "#9ec0ff"
    services:
      - name: "Apps"
        icon: "fas fa-desktop"
        items:
          - name: "Plex"
            subtitle: "Media server"
            logo: "https://cdn.simpleicons.org/plex/EBAF00"
            url: "https://plex.home.keeposz.dev"
            target: "_blank"
            type: "Ping"
          - name: "Recepten"
            subtitle: "Recept app"
            icon: "fas fa-utensils"
            url: "https://recepten.home.keeposz.dev"
            target: "_blank"
            type: "Ping"
      - name: "Infra"
        icon: "fas fa-cogs"
        items:
          - name: "ArgoCD"
            subtitle: "GitOps deployments"
            logo: "https://cdn.simpleicons.org/argo/EF7B4D"
            url: "https://argocd.home.keeposz.dev"
            target: "_blank"
            type: "Ping"
          - name: "Renovate"
            subtitle: "Dependency updates"
            icon: "fas fa-sync"
            url: "https://renovate.home.keeposz.dev"
            target: "_blank"
            type: "Ping"
      - name: "Observability"
        icon: "fas fa-chart-line"
        items:
          - name: "Grafana"
            subtitle: "Dashboards"
            logo: "https://cdn.simpleicons.org/grafana/F46800"
            url: "https://grafana.home.keeposz.dev"
            target: "_blank"
            type: "Ping"
          - name: "Prometheus"
            subtitle: "Metrics"
            logo: "https://cdn.simpleicons.org/prometheus/E6522C"
            url: "https://prometheus.home.keeposz.dev"
            target: "_blank"
            type: "Ping"
