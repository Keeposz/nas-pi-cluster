---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: nas-pi-cluster
  namespace: renovate-operator
spec:
  discoveryFilters:
    - Keeposz/nas-pi-cluster
  provider:
    name: github
  image: renovate/renovate:43.104.1
  # Every Monday at 05:00 UTC
  schedule: "0 5 * * 1"
  parallelism: 1
  secretRef: renovate-secret
  extraEnv:
    - name: NODE_OPTIONS
      value: "--max-old-space-size=896"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1280Mi"
      cpu: "500m"
