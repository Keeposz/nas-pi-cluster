---
# Daily snapshot of Plex's /config (Library DB, Preferences.xml, watch history,
# playlists, collections, posters). Writes a rotating tarball to the NAS so the
# full Plex state can be restored on any cluster.
#
# Restore: kubectl cp <backup>.tar.gz to /config of a fresh Plex pod, extract,
# pod restart. Plex picks up exact state — library, ratings, the works.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: plex-config-backup
  namespace: media
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1000
            runAsGroup: 100
            fsGroup: 100
          containers:
            - name: backup
              image: alpine:3.22
              command:
                - sh
                - -c
                - |
                  set -e
                  ts=$(date +%Y-%m-%d)
                  out=/backup/plex-config-${ts}.tar.gz
                  echo "Creating ${out}..."
                  tar -czf "${out}" -C /config .
                  echo "Done. Size: $(du -h ${out} | cut -f1)"
                  # Rotate: keep last 7 daily backups
                  ls -1t /backup/plex-config-*.tar.gz 2>/dev/null \
                    | tail -n +8 | xargs -r rm -v
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                - name: backup
                  mountPath: /backup
          volumes:
            - name: config
              persistentVolumeClaim:
                claimName: pms-config-plex-plex-media-server-0
            - name: backup
              hostPath:
                path: /srv/dev-disk-by-uuid-db0fba78-7fcc-48a0-8554-9f4d3f445363/NAS-PI/BACKUPS/plex
                type: DirectoryOrCreate
