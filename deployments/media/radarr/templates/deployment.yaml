---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
        - name: radarr
          image: lscr.io/linuxserver/radarr:5.14.0
          ports:
            - containerPort: 7878
              name: radarr-web
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Brussels"
          resources:
            requests:
              memory: "224Mi"   # was 256 — observed ~199Mi
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: films
              mountPath: /movies
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: films
          hostPath:
            path: /srv/dev-disk-by-uuid-db0fba78-7fcc-48a0-8554-9f4d3f445363/NAS-PI/PLEX/FILMS
        - name: downloads
          hostPath:
            path: /srv/dev-disk-by-uuid-db0fba78-7fcc-48a0-8554-9f4d3f445363/NAS-PI/MEDIA/downloads
            type: DirectoryOrCreate
