---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Keeposz/nas-pi-cluster.git
    path: deployments/argocd/argocd
    targetRevision: HEAD
    helm:
      releaseName: argocd
      valuesObject:
        argo-cd:
          global:
            domain: argocd.home.keeposz.dev
          configs:
            params:
              server.insecure: true
          server:
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
            ingress:
              enabled: true
              ingressClassName: traefik
              annotations:
                traefik.ingress.kubernetes.io/router.entrypoints: websecure
                traefik.ingress.kubernetes.io/router.tls: "true"
                cert-manager.io/cluster-issuer: letsencrypt-prod
              hosts:
                - argocd.home.keeposz.dev
              tls:
                - secretName: argocd-server-tls
                  hosts:
                    - argocd.home.keeposz.dev
          controller:
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
          repoServer:
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
          redis:
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
          applicationSet:
            enabled: false
          notifications:
            enabled: false
          dex:
            enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
