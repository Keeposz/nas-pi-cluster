---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qbittorrent
  namespace: media
spec:
  serviceName: qbittorrent
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      # Gluetun runs as a native sidecar (Kubernetes 1.29+): it starts before
      # qbittorrent and qbittorrent's start is gated on gluetun's startupProbe
      # passing. This eliminates the race where qbittorrent boots before the
      # VPN tunnel + DNS are ready, which left DHT/trackers permanently broken.
      initContainers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.40.0
          restartPolicy: Always
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "nordvpn"
            - name: VPN_TYPE
              value: "wireguard"
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: gluetun-wg
                  key: WIREGUARD_PRIVATE_KEY
            - name: SERVER_COUNTRIES
              value: "Netherlands"
            - name: SERVER_CATEGORIES
              value: "P2P"
            - name: TZ
              value: "Europe/Brussels"
            # Allow cluster traffic to reach qBittorrent WebUI through Gluetun's firewall.
            # 10.42.0.0/16 = k3s default pod CIDR, 10.43.0.0/16 = k3s default service CIDR.
            # Verify on cluster with: kubectl cluster-info dump | grep -E 'cluster-cidr|service-cluster-ip-range'
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.42.0.0/16,10.43.0.0/16"
            - name: FIREWALL_INPUT_PORTS
              value: "8080,8888"
            - name: HTTPPROXY
              value: "on"
            - name: HTTPPROXY_LISTENING_ADDRESS
              value: ":8888"
            # Plain DNS (no DoT) — DoT to Cloudflare intermittently times out
            # during the VPN handshake window and triggered restart loops.
            - name: DOT
              value: "off"
            # Skip block-list download at boot — it ran DNS lookups before the
            # tunnel was fully stable and added ~50s to startup.
            - name: BLOCK_MALICIOUS
              value: "off"
            # IP-based health target so the healthcheck doesn't depend on DNS.
            - name: HEALTH_TARGET_ADDRESS
              value: "1.1.1.1:443"
            - name: HEALTH_VPN_DURATION_INITIAL
              value: "60s"
          ports:
            - containerPort: 8080
              name: qbit-web
            - containerPort: 8888
              name: http-proxy
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "192Mi"
              cpu: "200m"
          # Gates qbittorrent's start: gluetun is "Ready" only once its own
          # healthcheck on 127.0.0.1:9999 returns 200, i.e. VPN tunnel up.
          startupProbe:
            httpGet:
              host: 127.0.0.1
              port: 9999
              path: /
            periodSeconds: 2
            failureThreshold: 60   # up to 120s for the tunnel to come up
          livenessProbe:
            httpGet:
              host: 127.0.0.1
              port: 9999
              path: /
            periodSeconds: 30
            failureThreshold: 3

      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.0.4
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Brussels"
            - name: WEBUI_PORT
              value: "8080"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: downloads
          hostPath:
            path: /srv/dev-disk-by-uuid-db0fba78-7fcc-48a0-8554-9f4d3f445363/NAS-PI/MEDIA/downloads
            type: DirectoryOrCreate
