---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: flaresolverr
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      containers:
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:v3.3.21
          ports:
            - containerPort: 8191
              name: http
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: TZ
              value: "Europe/Brussels"
            - name: BROWSER_TIMEOUT
              value: "40000"
          resources:
            requests:
              memory: "192Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /
              port: 8191
            initialDelaySeconds: 20
            periodSeconds: 15
