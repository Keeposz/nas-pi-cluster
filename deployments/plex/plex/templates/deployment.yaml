---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: plex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      containers:
        - name: plex
          image: lscr.io/linuxserver/plex:latest
          ports:
            - containerPort: 32400
              name: plex-web
          env:
            - name: PUID
              value: "1000"
            # PGID 100 matches host group "users" — required for the
            # linuxserver/plex container to delete media via the Plex UI on
            # OMV-style hostpaths where files are owned by jonas:users.
            # PGID 1000 caused "There was a problem deleting this item" even
            # though UID matched (linuxserver/docker-plex#213).
            - name: PGID
              value: "100"
            - name: TZ
              value: "Europe/Brussels"
            - name: VERSION
              value: "docker"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1536Mi"
              cpu: "1500m"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: films
              mountPath: /data/films
            - name: series
              mountPath: /data/series
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: plex-config
        - name: films
          hostPath:
            path: /srv/dev-disk-by-uuid-db0fba78-7fcc-48a0-8554-9f4d3f445363/NAS-PI/PLEX/FILMS
        - name: series
          hostPath:
            path: /srv/dev-disk-by-uuid-db0fba78-7fcc-48a0-8554-9f4d3f445363/NAS-PI/PLEX/SERIES
