---
apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: plex
spec:
  # LoadBalancer (instead of ClusterIP) so K3s svclb exposes port 32400 on
  # the node's LAN IP (192.168.0.50). This makes Plex reachable as a true
  # local LAN service, which lets plex.tv detect TV clients as "local"
  # connections and bypass the Remote Watch Pass restriction.
  type: LoadBalancer
  selector:
    app: plex
  ports:
    - port: 32400
      targetPort: 32400
      name: plex-web
