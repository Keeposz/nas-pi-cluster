---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-subnet-router
  namespace: tailscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailscale-subnet-router
  template:
    metadata:
      labels:
        app: tailscale-subnet-router
    spec:
      serviceAccountName: tailscale-sa
      # Mark as critical cluster infra so Tailscale isn't the first thing
      # evicted when the node hits memory pressure (e.g. Plex transcoding
      # spike, Prometheus scrape blip). Kubelet will preempt lower-priority
      # pods first, keeping the tunnel up.
      priorityClassName: system-cluster-critical
      containers:
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:latest
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: auth-key
            - name: TS_ROUTES
              value: "10.42.0.0/16,10.43.0.0/16"
            - name: TS_KUBE_SECRET
              value: "tailscale-state"
            - name: TS_USERSPACE
              value: "false"
            - name: TS_HOSTNAME
              value: "nas-pi-cluster"
          resources:
            requests:
              memory: "64Mi"     # was 32Mi — observed up to ~50Mi steady state
              cpu: "25m"
            limits:
              memory: "128Mi"    # was 64Mi — headroom for DERP switches / peer add bursts
              cpu: "100m"
          # Lightweight liveness: only checks if the tailscale daemon socket is
          # responsive (i.e. the process itself is healthy). NOT a network/DERP
          # connectivity test — the old netcheck probe was network-dependent
          # and killed the pod on transient DERP-relay slowness, causing more
          # outages than it fixed. Tailscale has its own internal reconnect
          # logic for tunnel/peer issues, so let it handle network blips
          # without a kubelet restart breaking established connections.
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - tailscale status --json --peers=false >/dev/null 2>&1
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
          startupProbe:
            exec:
              command:
                - tailscale
                - status
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24    # up to 2 min for first connection
