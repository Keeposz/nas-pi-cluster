---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: nas-pi-cluster
  namespace: renovate-operator
spec:
  discoveryFilters:
    - Keeposz/nas-pi-cluster
  provider:
    name: github
  image: renovate/renovate:43.104.1
  # Sunday 02:00 UTC = 04:00 Europe/Brussels (summer) / 03:00 (winter)
  schedule: "0 2 * * 0"
  parallelism: 1
  secretRef: renovate-secret
  extraEnv:
    - name: NODE_OPTIONS
      value: "--max-old-space-size=896"
    - name: RENOVATE_GIT_AUTHOR
      value: "Keeposz <205087396+Keeposz@users.noreply.github.com>"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1280Mi"
      cpu: "500m"
